name: Keep App Alive

on:
  schedule:
    # Esegue l'azione ogni 6 ore (alle 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Ti permette di avviarlo anche a mano per fare un test

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Aggiorna il file di ping con l'orario attuale
      run: |
        echo "Ultimo risveglio automatico: $(date)" > ping.txt

    - name: Commit e Push delle modifiche
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add ping.txt
        git commit -m "Chore: Keep-alive ping [skip ci]" || exit 0
        git push
